<div class="auth-split-layout">
  <div class="auth-visual">
    <div class="visual-overlay"></div>
    <div class="visual-content">
      <h1 class="brand-title">✨ IDMS</h1>
      <p class="brand-subtitle">Streamlined Intern Data Tracking & Batch Operations</p>
    </div>
  </div>

  <div class="auth-interaction">
    <div class="auth-card">
      <h2 class="welcome-text">Welcome Back</h2>
      <p class="subtitle">Please enter your credentials to access the platform.</p>

      <form (ngSubmit)="login()" class="auth-form">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" placeholder="john@example.com" [(ngModel)]="user.email" name="email" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" placeholder="••••••••" [(ngModel)]="user.password" name="password" required>
          </div>
        </div>

        <button type="submit" class="submit-btn mt-4 pulse-hover">Access IDMS</button>

        <div class="auth-footer mt-4">
          <p>Don't have an account yet? <a routerLink="/register">Create one now</a></p>
        </div>
      </form>
    </div>
  </div>
</div>
